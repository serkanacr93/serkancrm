{% extends "base.html" %}

{% block title %}Yeni Müşteri Ekle - CRM Sistemi{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2><i class="bi bi-person-plus"></i> Yeni Müşteri Ekle</h2>
    <a href="{{ url_for('customers') }}" class="btn btn-secondary"><i class="bi bi-arrow-left"></i> Geri</a>
</div>

<form method="POST">
    <div class="row">
        <div class="col-md-6">
            <div class="card mb-4">
                <div class="card-header bg-primary text-white">
                    <i class="bi bi-building"></i> Firma Bilgileri
                </div>
                <div class="card-body">
                    <div class="mb-3">
                        <label for="company_name" class="form-label">Firma Adı</label>
                        <input type="text" class="form-control" id="company_name" name="company_name">
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="tax_office" class="form-label">Vergi Dairesi</label>
                            <input type="text" class="form-control" id="tax_office" name="tax_office">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="tax_id" class="form-label">Vergi Numarası</label>
                            <input type="text" class="form-control" id="tax_id" name="tax_id">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="trade_registry" class="form-label">Ticaret Sicil No</label>
                        <input type="text" class="form-control" id="trade_registry" name="trade_registry">
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="company_phone" class="form-label">Firma Telefon</label>
                            <input type="tel" class="form-control" id="company_phone" name="company_phone">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="company_email" class="form-label">Firma E-posta</label>
                            <input type="email" class="form-control" id="company_email" name="company_email">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="company_website" class="form-label">Web Sitesi</label>
                        <input type="url" class="form-control" id="company_website" name="company_website" placeholder="https://">
                    </div>
                    <div class="mb-3">
                        <label for="company_address" class="form-label">Firma Adresi</label>
                        <textarea class="form-control" id="company_address" name="company_address" rows="2"></textarea>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card mb-4">
                <div class="card-header bg-success text-white">
                    <i class="bi bi-person-badge"></i> Yetkili Kişi
                </div>
                <div class="card-body">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="first_name" class="form-label">Ad</label>
                            <input type="text" class="form-control" id="first_name" name="first_name">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="last_name" class="form-label">Soyad</label>
                            <input type="text" class="form-control" id="last_name" name="last_name">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="contact_title" class="form-label">Unvan</label>
                        <input type="text" class="form-control" id="contact_title" name="contact_title" placeholder="Örn: Satın Alma Müdürü">
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="contact_phone" class="form-label">Cep Telefonu</label>
                            <input type="tel" class="form-control" id="contact_phone" name="contact_phone">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="contact_email" class="form-label">E-posta</label>
                            <input type="email" class="form-control" id="contact_email" name="contact_email">
                        </div>
                    </div>
                </div>
            </div>

            <div class="card mb-4">
                <div class="card-header bg-info text-white">
                    <i class="bi bi-person"></i> Kişisel Bilgiler
                </div>
                <div class="card-body">
                    <div class="mb-3">
                        <label for="email" class="form-label">Kişisel E-posta</label>
                        <input type="email" class="form-control" id="email" name="email">
                    </div>
                    <div class="mb-3">
                        <label for="phone" class="form-label">Kişisel Telefon</label>
                        <input type="tel" class="form-control" id="phone" name="phone">
                    </div>
                    <div class="mb-3">
                        <label for="address" class="form-label">Kişisel Adres</label>
                        <textarea class="form-control" id="address" name="address" rows="2"></textarea>
                    </div>
                </div>
            </div>

            <div class="card mb-4">
                <div class="card-header bg-secondary text-white">
                    <i class="bi bi-journal-text"></i> Notlar
                </div>
                <div class="card-body">
                    <textarea class="form-control" id="notes" name="notes" rows="3"></textarea>
                </div>
            </div>
        </div>
    </div>

    <div class="d-flex justify-content-end gap-2 mb-4">
        <button type="submit" class="btn btn-primary btn-lg"><i class="bi bi-check-lg"></i> Kaydet</button>
        <a href="{{ url_for('customers') }}" class="btn btn-secondary btn-lg"><i class="bi bi-x-lg"></i> İptal</a>
    </div>
</form>
{% endblock %}
