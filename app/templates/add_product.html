{% extends "base.html" %}
{% block title %}Yeni Ürün{% endblock %}
{% block content %}
<h2 class="mb-4"><i class="bi bi-plus-circle"></i> Yeni Ürün Ekle</h2>
<div class="row">
    <div class="col-md-8">
        <div class="card shadow-sm">
            <div class="card-body">
                <form method="POST">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <div class="row">
                        <div class="col-md-6 mb-3"><label class="form-label">Ürün Adı *</label><input type="text" class="form-control" name="name" required></div>
                        <div class="col-md-3 mb-3"><label class="form-label">SKU</label><input type="text" class="form-control" name="sku"></div>
                        <div class="col-md-3 mb-3"><label class="form-label">Kategori</label><input type="text" class="form-control" name="category"></div>
                    </div>
                    <div class="mb-3"><label class="form-label">Açıklama</label><textarea class="form-control" name="description" rows="2"></textarea></div>
                    <div class="row">
                        <div class="col-md-3 mb-3"><label class="form-label">Birim</label><select class="form-select" name="unit"><option value="adet">Adet</option><option value="kg">Kg</option><option value="mt">Metre</option><option value="lt">Litre</option><option value="m2">m²</option><option value="set">Set</option></select></div>
                        <div class="col-md-3 mb-3"><label class="form-label">Stok Miktarı</label><input type="number" class="form-control" name="stock_quantity" value="0" step="0.01"></div>
                        <div class="col-md-3 mb-3"><label class="form-label">Min. Stok</label><input type="number" class="form-control" name="min_stock" value="0" step="0.01"></div>
                        <div class="col-md-3 mb-3"><label class="form-label">Maliyet (₺)</label><input type="number" class="form-control" name="cost_price" value="0" step="0.01"></div>
                    </div>
                    <div class="row">
                        <div class="col-md-3 mb-3"><label class="form-label">Satış Fiyatı (₺)</label><input type="number" class="form-control" name="sell_price" value="0" step="0.01"></div>
                    </div>
                    <div class="d-flex gap-2"><button type="submit" class="btn btn-primary"><i class="bi bi-check"></i> Kaydet</button><a href="{{ url_for('products') }}" class="btn btn-secondary">İptal</a></div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
