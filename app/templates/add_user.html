{% extends "base.html" %}
{% block title %}Yeni Kullanıcı{% endblock %}
{% block content %}
<h2 class="mb-4"><i class="bi bi-person-plus"></i> Yeni Kullanıcı</h2>
<div class="row">
    <div class="col-md-6">
        <div class="card shadow-sm">
            <div class="card-body">
                <form method="POST">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <div class="mb-3"><label class="form-label">Kullanıcı Adı *</label><input type="text" class="form-control" name="username" required></div>
                    <div class="mb-3"><label class="form-label">E-posta *</label><input type="email" class="form-control" name="email" required></div>
                    <div class="mb-3"><label class="form-label">Ad Soyad</label><input type="text" class="form-control" name="full_name"></div>
                    <div class="mb-3"><label class="form-label">Şifre *</label><input type="password" class="form-control" name="password" required></div>
                    <div class="mb-3"><label class="form-label">Rol</label><select class="form-select" name="role"><option value="user">Kullanıcı</option><option value="admin">Yönetici</option></select></div>
                    <div class="d-flex gap-2"><button type="submit" class="btn btn-primary"><i class="bi bi-check"></i> Kaydet</button><a href="{{ url_for('users') }}" class="btn btn-secondary">İptal</a></div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
