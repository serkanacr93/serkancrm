{% extends "base.html" %}

{% block title %}Sevkiyat Düzenle - CRM Sistemi{% endblock %}

{% block content %}
<h2 class="mb-4"><i class="bi bi-pencil"></i> Sevkiyat Düzenle #{{ shipment.id }}</h2>

<div class="row">
    <div class="col-md-8">
        <div class="card">
            <div class="card-body">
                <form method="POST">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label for="carrier" class="form-label">Kargo Firması</label>
                            <select class="form-select" id="carrier" name="carrier">
                                <option value="">Seçiniz...</option>
                                {% for c in carriers %}
                                <option value="{{ c }}" {{ 'selected' if shipment.carrier == c }}>{{ c }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label for="tracking_number" class="form-label">Takip Numarası</label>
                            <input type="text" class="form-control" id="tracking_number" name="tracking_number" value="{{ shipment.tracking_number or '' }}">
                        </div>
                        <div class="col-md-4 mb-3">
                            <label for="status" class="form-label">Durum</label>
                            <select class="form-select" id="status" name="status">
                                {% for key, label in statuses %}
                                <option value="{{ key }}" {{ 'selected' if shipment.status == key }}>{{ label }}</option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label for="ship_date" class="form-label">Gönderim Tarihi</label>
                            <input type="date" class="form-control" id="ship_date" name="ship_date" value="{{ shipment.ship_date.strftime('%Y-%m-%d') if shipment.ship_date else '' }}">
                        </div>
                        <div class="col-md-4 mb-3">
                            <label for="estimated_delivery_date" class="form-label">Tahmini Teslim Tarihi</label>
                            <input type="date" class="form-control" id="estimated_delivery_date" name="estimated_delivery_date" value="{{ shipment.estimated_delivery_date.strftime('%Y-%m-%d') if shipment.estimated_delivery_date else '' }}">
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Gerçek Teslim Tarihi</label>
                            <input type="text" class="form-control" value="{{ shipment.actual_delivery_date.strftime('%d.%m.%Y') if shipment.actual_delivery_date else 'Henüz teslim edilmedi' }}" readonly>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="notes" class="form-label">Notlar</label>
                        <textarea class="form-control" id="notes" name="notes" rows="2">{{ shipment.notes or '' }}</textarea>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg"></i> Güncelle</button>
                        <a href="{{ url_for('production_detail', id=shipment.production_id) }}" class="btn btn-secondary"><i class="bi bi-x-lg"></i> İptal</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
