{% extends "base.html" %}
{% block title %}Kullanıcı Düzenle{% endblock %}
{% block content %}
<h2 class="mb-4"><i class="bi bi-pencil"></i> Kullanıcı Düzenle</h2>
<div class="row">
    <div class="col-md-6">
        <div class="card shadow-sm">
            <div class="card-body">
                <form method="POST">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <div class="mb-3"><label class="form-label">Kullanıcı Adı *</label><input type="text" class="form-control" name="username" value="{{ user.username }}" required></div>
                    <div class="mb-3"><label class="form-label">E-posta *</label><input type="email" class="form-control" name="email" value="{{ user.email }}" required></div>
                    <div class="mb-3"><label class="form-label">Ad Soyad</label><input type="text" class="form-control" name="full_name" value="{{ user.full_name or '' }}"></div>
                    <div class="mb-3"><label class="form-label">Yeni Şifre (boş bırakılırsa değişmez)</label><input type="password" class="form-control" name="password"></div>
                    <div class="mb-3"><label class="form-label">Rol</label><select class="form-select" name="role"><option value="user" {{ 'selected' if user.role == 'user' }}>Kullanıcı</option><option value="admin" {{ 'selected' if user.role == 'admin' }}>Yönetici</option></select></div>
                    <div class="mb-3 form-check"><input type="checkbox" class="form-check-input" name="is_active" id="is_active" {{ 'checked' if user.is_active }}><label class="form-check-label" for="is_active">Aktif</label></div>
                    <div class="d-flex gap-2"><button type="submit" class="btn btn-primary"><i class="bi bi-check"></i> Güncelle</button><a href="{{ url_for('users') }}" class="btn btn-secondary">İptal</a></div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
