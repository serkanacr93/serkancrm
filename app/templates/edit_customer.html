{% extends "base.html" %}

{% block title %}Müşteri Düzenle - CRM Sistemi{% endblock %}

{% block content %}
<h2 class="mb-4"><i class="bi bi-pencil"></i> Müşteri Düzenle</h2>

<div class="row">
    <div class="col-md-8">
        <div class="card">
            <div class="card-body">
                <form method="POST">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="first_name" class="form-label">Ad *</label>
                            <input type="text" class="form-control" id="first_name" name="first_name" value="{{ customer.first_name }}" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="last_name" class="form-label">Soyad *</label>
                            <input type="text" class="form-control" id="last_name" name="last_name" value="{{ customer.last_name }}" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="email" class="form-label">E-posta *</label>
                        <input type="email" class="form-control" id="email" name="email" value="{{ customer.email }}" required>
                    </div>
                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label for="phone" class="form-label">Telefon</label>
                            <input type="tel" class="form-control" id="phone" name="phone" value="{{ customer.phone or '' }}">
                        </div>
                        <div class="col-md-4 mb-3">
                            <label for="company" class="form-label">Şirket</label>
                            <input type="text" class="form-control" id="company" name="company" value="{{ customer.company or '' }}">
                        </div>
                        <div class="col-md-4 mb-3">
                            <label for="tax_id" class="form-label">Vergi No</label>
                            <input type="text" class="form-control" id="tax_id" name="tax_id" value="{{ customer.tax_id or '' }}">
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="status" class="form-label">Durum</label>
                            <select class="form-select" id="status" name="status">
                                <option value="aktif" {{ 'selected' if customer.status == 'aktif' }}>Aktif</option>
                                <option value="pasif" {{ 'selected' if customer.status == 'pasif' }}>Pasif</option>
                                <option value="potansiyel" {{ 'selected' if customer.status == 'potansiyel' }}>Potansiyel</option>
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="siparis_dongusu_gun" class="form-label">
                                Sipariş Döngüsü (gün)
                                <i class="bi bi-info-circle" title="Bu müşterinin ortalama kaç günde bir sipariş verdiği - üretim hatırlatması için kullanılır"></i>
                            </label>
                            <input type="number" class="form-control" id="siparis_dongusu_gun" name="siparis_dongusu_gun" value="{{ customer.siparis_dongusu_gun }}" min="1">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="address" class="form-label">Adres</label>
                        <textarea class="form-control" id="address" name="address" rows="2">{{ customer.address or '' }}</textarea>
                    </div>
                    <div class="mb-3">
                        <label for="notes" class="form-label">Notlar</label>
                        <textarea class="form-control" id="notes" name="notes" rows="2">{{ customer.notes or '' }}</textarea>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg"></i> Güncelle</button>
                        <a href="{{ url_for('customer_detail', id=customer.id) }}" class="btn btn-secondary"><i class="bi bi-x-lg"></i> İptal</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
